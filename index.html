<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG Character Manager</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <h1>RPG Character Manager</h1>

        <!-- Character Form -->
        <form id="characterForm">

            <h2>Basic Information</h2>

            <label>Name</label>
            <input type="text" id="name" required>

            <label>Race</label>
            <input type="text" id="race" required>

            <label>Age</label>
            <input type="number" id="age" min="0" required>

            <label>Gender</label>
            <input type="text" id="gender" required>

            <label>Profession</label>
            <input type="text" id="profession" required>

            <label>Image URL</label>
            <input type="text" id="image">

            <h2>Status</h2>

            <label>Health</label>
            <input type="number" id="health" min="0" required>

            <label>Mana</label>
            <input type="number" id="mana" min="0" required>

            <h2>Attributes</h2>

            <label>Vigor</label>
            <input type="number" id="vigor" min="0" required>

            <label>Skill</label>
            <input type="number" id="skill" min="0" required>

            <label>Perception</label>
            <input type="number" id="perception" min="0" required>

            <label>Intelligence</label>
            <input type="number" id="intelligence" min="0" required>

            <label>Mastery</label>
            <input type="number" id="mastery" min="0" required>

            <button type="submit">Save Character</button>

        </form>

        <!-- Characters will appear here -->
        <div id="characterList"></div>

    </div>

    <script src="script.js"></script>
</body>
</html>
